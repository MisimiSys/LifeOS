name: Apply LifeOS recipe sync bridge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-lifeos-sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply source patch
        shell: bash
        run: |
          cat > /tmp/lifeos-recipe-sync.patch <<'PATCH'
          diff --git a/.env.example b/.env.example
          index ed230ff..e387aa4 100644
          --- a/.env.example
          +++ b/.env.example
          @@ -1,6 +1,7 @@
          -VITE_LIFEOS_SYNC_API_URL=https://your-lifeos-api.vercel.app/api/recipes/upsert
          +VITE_LIFEOS_SYNC_API_URL=https://life-os-jideatoms-projects.vercel.app/api/recipes/upsert
           
           # Serverless-only secrets. Do not expose these in the frontend bundle.
           NOTION_TOKEN=secret_xxx
          -NOTION_RECIPES_DATABASE_ID=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          +NOTION_RECIPES_DATABASE_ID=661c96696c3542948097e4e11ddbc545
          +NOTION_RECIPE_KEY_PROPERTY=LifeOS Key
           LIFEOS_ALLOWED_ORIGIN=https://jideatom.github.io
          diff --git a/README.md b/README.md
          index 3c164d8..224d295 100644
          --- a/README.md
          +++ b/README.md
          @@ -1,12 +1,12 @@
           # LifeOS App
           
          -LifeOS is a health operating system for fasting, Abuja/Yoruba nutrition, StrongLifts-style training, Fitbit recovery signals and Notion-backed daily planning.
          +LifeOS is a health operating system for fasting, Abuja nutrition, StrongLifts-style training, Fitbit recovery signals and Notion-backed daily planning.
           
           ## Current Foundation
           
           - React + TypeScript + Vite dashboard
           - Fasting-first daily command center
          -- Yoruba low-carb nutrition model
          +- Abuja low-carb nutrition model
           - Home gym StrongLifts plan
           - Fitbit app -> Health Connect -> LifeOS sync design
           - Editable recipes with local save and optional Notion auto-sync bridge
          @@ -52,21 +52,23 @@ The frontend never stores a Notion token. Recipe edits sync through `api/recipes
           Create a Notion database with these properties:
           
           - `Name` - title
          -- `Type` - select
          -- `Carb Signal` - select
          +- `Type` - rich text
          +- `Carb Signal` - rich text
           - `Base` - rich text
           - `Protein` - rich text
           - `Vehicle / Note` - rich text
          -- `Source` - select
          -- `LifeOS ID` - rich text
          -- `Updated At` - date
          +- `Source` - rich text
          +- `LifeOS Key` - rich text, used by the sync bridge
          +- `LifeOS ID` - optional Notion auto-number
          +- `Updated At` - optional last edited time
           
           Serverless environment variables:
           
           - `NOTION_TOKEN` - internal Notion integration token
          -- `NOTION_RECIPES_DATABASE_ID` - target recipes database id
          +- `NOTION_RECIPES_DATABASE_ID` - target recipes database id, currently `661c96696c3542948097e4e11ddbc545`
          +- `NOTION_RECIPE_KEY_PROPERTY` - defaults to `LifeOS Key`
           - `LIFEOS_ALLOWED_ORIGIN` - optional, for example `https://jideatom.github.io`
           
           Frontend environment variable:
           
          -- `VITE_LIFEOS_SYNC_API_URL` - full API URL, for example `https://your-lifeos-api.vercel.app/api/recipes/upsert`
          +- `VITE_LIFEOS_SYNC_API_URL` - full API URL. The app defaults to `https://life-os-jideatoms-projects.vercel.app/api/recipes/upsert`.
          diff --git a/api/recipes/upsert.js b/api/recipes/upsert.js
          index e7c98cc..feb9da8 100644
          --- a/api/recipes/upsert.js
          +++ b/api/recipes/upsert.js
          @@ -1,4 +1,5 @@
           const NOTION_VERSION = '2022-06-28'
          +const RECIPE_KEY_PROPERTY = process.env.NOTION_RECIPE_KEY_PROPERTY || 'LifeOS Key'
           
           function sendJson(response, statusCode, payload) {
             response.statusCode = statusCode
          @@ -44,33 +45,16 @@ function titleProperty(value) {
             }
           }
           
          -function selectProperty(value) {
          -  return {
          -    select: {
          -      name: String(value || 'Custom'),
          -    },
          -  }
          -}
          -
          -function dateProperty(value) {
          -  return {
          -    date: {
          -      start: value || new Date().toISOString().slice(0, 10),
          -    },
          -  }
          -}
          -
           function recipeProperties(recipe) {
             return {
               Name: titleProperty(recipe.title),
          -    Type: selectProperty(recipe.tag),
          -    'Carb Signal': selectProperty(recipe.carbSignal),
          +    Type: textProperty(recipe.tag),
          +    'Carb Signal': textProperty(recipe.carbSignal),
               Base: textProperty(recipe.base),
               Protein: textProperty(recipe.protein),
               'Vehicle / Note': textProperty(recipe.vehicle),
          -    Source: selectProperty(recipe.source),
          -    'LifeOS ID': textProperty(recipe.id),
          -    'Updated At': dateProperty(recipe.updatedAt),
          +    Source: textProperty(recipe.source),
          +    [RECIPE_KEY_PROPERTY]: textProperty(recipe.id),
             }
           }
           
          @@ -99,7 +83,7 @@ async function findRecipePage(databaseId, recipeId) {
               method: 'POST',
               body: JSON.stringify({
                 filter: {
          -        property: 'LifeOS ID',
          +        property: RECIPE_KEY_PROPERTY,
                   rich_text: {
                     equals: recipeId,
                   },
          diff --git a/src/App.tsx b/src/App.tsx
          index cb55aab..6c3af1b 100644
          --- a/src/App.tsx
          +++ b/src/App.tsx
          @@ -39,7 +39,8 @@ import './App.css'
           
           const NOTION_LIFEOS_URL =
             'https://app.notion.com/p/LifeOS-Command-Center-3544ab8a5f28813d967af856319c8f67?source=copy_link'
          -const NOTION_SYNC_ENDPOINT = import.meta.env.VITE_LIFEOS_SYNC_API_URL ?? ''
          +const DEFAULT_NOTION_SYNC_ENDPOINT = 'https://life-os-jideatoms-projects.vercel.app/api/recipes/upsert'
          +const NOTION_SYNC_ENDPOINT = import.meta.env.VITE_LIFEOS_SYNC_API_URL ?? DEFAULT_NOTION_SYNC_ENDPOINT
           const ACTIVE_FAST_STORAGE_KEY = 'lifeos.activeFastStartIso'
           const FASTING_PLAN_STORAGE_KEY = 'lifeos.selectedFastingPlan'
           const CUSTOM_PLAN_STORAGE_KEY = 'lifeos.customFastingPlan'
          PATCH

          sed -i 's/^          //' /tmp/lifeos-recipe-sync.patch
          if git apply --check /tmp/lifeos-recipe-sync.patch; then
            git apply /tmp/lifeos-recipe-sync.patch
          else
            echo "Source patch is already applied or cannot apply cleanly; continuing to build."
          fi

      - name: Build static app
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - shell: bash
        run: |
          npm install
          npm run build
          mkdir -p assets
          rm -f assets/app-*.js
          cp -R dist/assets/* assets/
          cp dist/app.html index.html

      - name: Commit generated LifeOS update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/lifeos-apply-sync.yml
          git add .env.example README.md api/recipes/upsert.js src/App.tsx index.html assets
          if git diff --cached --quiet; then
            echo "No LifeOS changes to commit."
          else
            git commit -m "Add Notion recipe sync bridge"
            git push
          fi
